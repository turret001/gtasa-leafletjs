<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GTA:SA Map Editor</title>
    <meta name="description" content="Multi-tenant GTA:SA map editor for MTA server owners." />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
      integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
      integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
      crossorigin=""
    ></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f0f23; color: #e0e0e0; }

      /* ── Auth & Dashboard screens ── */
      .screen { display: none; min-height: 100vh; }
      .screen.active { display: flex; }

      #auth-screen {
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #0f0f23, #1a1a2e);
      }
      .auth-box {
        background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
        padding: 36px; width: 380px; max-width: 90vw;
      }
      .auth-box h1 { color: #e94560; font-size: 22px; margin-bottom: 4px; }
      .auth-box p.subtitle { color: #a0a0b0; font-size: 13px; margin-bottom: 24px; }
      .auth-tabs { display: flex; gap: 0; margin-bottom: 20px; }
      .auth-tabs button {
        flex: 1; padding: 10px; border: 1px solid #2a2a4a; background: #0f0f23;
        color: #a0a0b0; cursor: pointer; font-size: 13px; font-weight: 600;
        transition: all 0.2s;
      }
      .auth-tabs button:first-child { border-radius: 6px 0 0 6px; }
      .auth-tabs button:last-child { border-radius: 0 6px 6px 0; }
      .auth-tabs button.active { background: #e94560; color: #fff; border-color: #e94560; }
      .form-group { margin-bottom: 14px; }
      .form-group label { display: block; color: #a0a0b0; font-size: 12px; margin-bottom: 4px; }
      .form-group input {
        width: 100%; padding: 10px 12px; border: 1px solid #2a2a4a; border-radius: 6px;
        background: #0f0f23; color: #e0e0e0; font-size: 14px; outline: none;
      }
      .form-group input:focus { border-color: #e94560; }
      .btn {
        width: 100%; padding: 11px; border: none; border-radius: 6px; font-size: 14px;
        font-weight: 600; cursor: pointer; transition: background 0.2s;
      }
      .btn-primary { background: #e94560; color: #fff; }
      .btn-primary:hover { background: #d63851; }
      .btn-secondary { background: #2a2a4a; color: #e0e0e0; }
      .btn-secondary:hover { background: #3a3a5a; }
      .btn-danger { background: transparent; border: 1px solid #ff6b6b; color: #ff6b6b; }
      .btn-danger:hover { background: #ff6b6b22; }
      .btn-sm { width: auto; padding: 7px 14px; font-size: 12px; }
      .auth-error { color: #ff6b6b; font-size: 12px; margin-top: 10px; display: none; }

      /* ── Dashboard ── */
      #dashboard-screen {
        flex-direction: column;
        background: #0f0f23;
      }
      .topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 24px; background: #1a1a2e; border-bottom: 1px solid #2a2a4a;
      }
      .topbar h2 { color: #e94560; font-size: 18px; }
      .topbar .user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #a0a0b0; }
      .dashboard-body { flex: 1; padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }
      .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
      .section-header h3 { font-size: 16px; color: #e0e0e0; }
      .card {
        background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px;
        padding: 16px; margin-bottom: 10px;
        display: flex; align-items: center; justify-content: space-between;
        transition: border-color 0.2s; cursor: pointer;
      }
      .card:hover { border-color: #e94560; }
      .card-info h4 { font-size: 14px; margin-bottom: 2px; }
      .card-info span { font-size: 11px; color: #a0a0b0; }
      .card-actions { display: flex; gap: 6px; }
      .card-actions button {
        padding: 5px 10px; border: 1px solid #2a2a4a; border-radius: 4px;
        background: #0f0f23; color: #a0a0b0; font-size: 11px; cursor: pointer;
      }
      .card-actions button:hover { border-color: #e94560; color: #e0e0e0; }
      .card-actions button.del:hover { border-color: #ff6b6b; color: #ff6b6b; }
      .empty-state { color: #555; font-size: 13px; padding: 20px; text-align: center; }

      /* ── API Keys section ── */
      .key-value {
        font-family: 'Consolas', 'Monaco', monospace; font-size: 12px;
        background: #0f0f23; padding: 4px 8px; border-radius: 4px; color: #7ec8e3;
        word-break: break-all;
      }
      .new-key-display {
        background: #0f2e1a; border: 1px solid #2a6a3a; border-radius: 8px;
        padding: 14px; margin-bottom: 14px; display: none;
      }
      .new-key-display p { font-size: 12px; color: #7ec8e3; margin-bottom: 6px; }
      .new-key-display code {
        display: block; font-family: monospace; font-size: 13px;
        color: #4caf50; word-break: break-all; padding: 6px;
        background: #0f0f23; border-radius: 4px;
      }
      .new-key-display .warn { color: #ffa726; font-size: 11px; margin-top: 6px; }

      /* ── Modal ── */
      .modal-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        z-index: 10000; align-items: center; justify-content: center;
      }
      .modal-overlay.active { display: flex; }
      .modal {
        background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px;
        padding: 28px; width: 400px; max-width: 90vw;
      }
      .modal h3 { margin-bottom: 16px; font-size: 16px; }
      .modal .form-group { margin-bottom: 12px; }
      .modal-buttons { display: flex; gap: 8px; margin-top: 16px; }
      .modal-buttons .btn { flex: 1; }

      /* ── Map Editor screen ── */
      #editor-screen { flex-direction: column; }
      .editor-topbar {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 16px; background: #1a1a2e; border-bottom: 1px solid #2a2a4a;
        z-index: 1000;
      }
      .editor-topbar .back-btn {
        background: none; border: 1px solid #2a2a4a; border-radius: 4px;
        color: #a0a0b0; padding: 6px 12px; cursor: pointer; font-size: 12px;
      }
      .editor-topbar .back-btn:hover { border-color: #e94560; color: #e0e0e0; }
      .editor-topbar .project-title { color: #e94560; font-size: 15px; font-weight: 700; }
      .editor-topbar .save-status { color: #a0a0b0; font-size: 11px; }
      .editor-body { flex: 1; display: flex; position: relative; }
      #map { flex: 1; background: #888; }

      /* ── Object sidebar ── */
      .obj-sidebar {
        width: 280px; background: #1a1a2e; border-left: 1px solid #2a2a4a;
        display: flex; flex-direction: column; overflow: hidden;
      }
      .obj-sidebar h4 {
        padding: 12px 14px; font-size: 13px; border-bottom: 1px solid #2a2a4a;
        color: #a0a0b0; display: flex; justify-content: space-between; align-items: center;
      }
      .obj-list { flex: 1; overflow-y: auto; padding: 8px; }
      .obj-item {
        padding: 8px 10px; border: 1px solid #2a2a4a; border-radius: 6px;
        margin-bottom: 6px; font-size: 12px; display: flex; align-items: center;
        justify-content: space-between; cursor: pointer; transition: border-color 0.2s;
      }
      .obj-item:hover { border-color: #e94560; }
      .obj-item .obj-color {
        width: 12px; height: 12px; border-radius: 3px; display: inline-block; margin-right: 8px;
      }
      .obj-item .obj-name { flex: 1; }
      .obj-item .obj-type { color: #666; font-size: 10px; text-transform: uppercase; }
      .obj-item button {
        background: none; border: none; color: #666; cursor: pointer; font-size: 14px; padding: 0 4px;
      }
      .obj-item button:hover { color: #ff6b6b; }

      /* ── Drawing tool (bottom-left of map) ── */
      #draw-tool {
        position: absolute; left: 12px; bottom: 12px; width: 320px;
        z-index: 999; font-size: 13px;
      }
      .dt-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 14px; background: linear-gradient(135deg, #1a1a2e, #16213e);
        color: #e94560; border-radius: 8px 8px 0 0; cursor: pointer;
        user-select: none; font-weight: 700; font-size: 13px;
      }
      #draw-tool.collapsed .dt-body { display: none; }
      #draw-tool.collapsed .dt-header { border-radius: 8px; }
      .dt-body {
        background: #1a1a2e; padding: 12px; border-radius: 0 0 8px 8px;
        border-top: 1px solid #2a2a4a;
      }
      .dt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
      .dt-row label { color: #a0a0b0; font-size: 12px; min-width: 42px; }
      .dt-row select, .dt-row input[type="text"] {
        flex: 1; padding: 6px 10px; border: 1px solid #2a2a4a; border-radius: 4px;
        background: #0f0f23; color: #e0e0e0; font-size: 13px; outline: none;
      }
      .dt-row input[type="text"]:focus, .dt-row select:focus { border-color: #e94560; }
      .dt-row input[type="color"] {
        width: 36px; height: 30px; border: 1px solid #2a2a4a; border-radius: 4px;
        background: #0f0f23; cursor: pointer; padding: 2px;
      }
      .dt-status { color: #a0a0b0; font-size: 12px; margin-bottom: 8px; }
      .dt-status .pc { color: #e94560; font-weight: 600; }
      .dt-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
      .dt-buttons button {
        flex: 1; min-width: 0; padding: 7px 6px; border: 1px solid #2a2a4a; border-radius: 4px;
        background: #0f0f23; color: #e0e0e0; font-size: 12px; cursor: pointer;
        transition: background 0.2s, border-color 0.2s; white-space: nowrap;
      }
      .dt-buttons button:hover { background: #16213e; border-color: #e94560; }
      .dt-buttons button.dbtn-danger:hover { border-color: #ff6b6b; color: #ff6b6b; }
      .dt-buttons button.dbtn-primary {
        background: #e94560; border-color: #e94560; color: #fff; font-weight: 600;
      }
      .dt-buttons button.dbtn-primary:hover { background: #d63851; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0f0f23; }
      ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    </style>
  </head>
  <body>

    <!-- ══════════ AUTH SCREEN ══════════ -->
    <div id="auth-screen" class="screen active">
      <div class="auth-box">
        <h1>GTA:SA Map Editor</h1>
        <p class="subtitle">Multi-tenant map editor for MTA server owners</p>
        <div class="auth-tabs">
          <button class="active" onclick="showAuthTab('login')">Login</button>
          <button onclick="showAuthTab('register')">Register</button>
        </div>
        <form id="auth-form">
          <div class="form-group">
            <label for="auth-email">Email</label>
            <input id="auth-email" type="email" autocomplete="email" required />
          </div>
          <div class="form-group">
            <label for="auth-pass">Password</label>
            <input id="auth-pass" type="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="btn btn-primary" id="auth-submit">Login</button>
          <div class="auth-error" id="auth-error"></div>
        </form>
      </div>
    </div>

    <!-- ══════════ DASHBOARD SCREEN ══════════ -->
    <div id="dashboard-screen" class="screen">
      <div class="topbar">
        <h2>GTA:SA Map Editor</h2>
        <div class="user-info">
          <span id="user-email"></span>
          <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
        </div>
      </div>
      <div class="dashboard-body">
        <!-- Projects -->
        <div style="margin-bottom: 32px;">
          <div class="section-header">
            <h3>Projects</h3>
            <button class="btn btn-primary btn-sm" onclick="openModal('new-project')">+ New Project</button>
          </div>
          <div id="project-list"></div>
        </div>

        <!-- API Keys -->
        <div>
          <div class="section-header">
            <h3>API Keys</h3>
            <button class="btn btn-primary btn-sm" onclick="openModal('new-key')">+ New Key</button>
          </div>
          <div class="new-key-display" id="new-key-display">
            <p>Your new API key:</p>
            <code id="new-key-value"></code>
            <div class="warn">Save this key now — it won't be shown in full again.</div>
          </div>
          <div id="key-list"></div>
        </div>
      </div>
    </div>

    <!-- ══════════ MAP EDITOR SCREEN ══════════ -->
    <div id="editor-screen" class="screen">
      <div class="editor-topbar">
        <button class="back-btn" onclick="goToDashboard()">&larr; Dashboard</button>
        <span class="project-title" id="editor-project-name"></span>
        <span class="save-status" id="save-status"></span>
      </div>
      <div class="editor-body">
        <div id="map"></div>

        <!-- Drawing tool -->
        <div id="draw-tool">
          <div class="dt-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <span>EPIC TOOL 9000</span>
            <span style="font-size:11px;color:#a0a0b0;">&#9660;</span>
          </div>
          <div class="dt-body">
            <div class="dt-row">
              <label>Type</label>
              <select id="draw-type">
                <option value="polygon">Polygon</option>
                <option value="polyline">Polyline</option>
                <option value="marker">Marker</option>
              </select>
            </div>
            <div class="dt-row">
              <label>Name</label>
              <input id="draw-name" type="text" autocomplete="off" placeholder="Object name..." />
            </div>
            <div class="dt-row">
              <label>Color</label>
              <input id="draw-color" type="color" value="#e94560" />
            </div>
            <div class="dt-status">
              Points: <span class="pc" id="draw-point-count">0</span>
            </div>
            <div class="dt-buttons">
              <button onclick="drawUndo()">Undo</button>
              <button class="dbtn-danger" onclick="drawClear()">Clear</button>
              <button class="dbtn-primary" onclick="drawSave()">Save</button>
            </div>
          </div>
        </div>

        <!-- Objects sidebar -->
        <div class="obj-sidebar">
          <h4>
            <span>Map Objects</span>
            <span id="obj-count" style="color:#e94560;">0</span>
          </h4>
          <div class="obj-list" id="obj-list"></div>
        </div>
      </div>
    </div>

    <!-- ══════════ MODALS ══════════ -->
    <div class="modal-overlay" id="modal-new-project">
      <div class="modal">
        <h3>New Project</h3>
        <div class="form-group">
          <label>Project Name</label>
          <input id="new-project-name" type="text" placeholder="My MTA Server Map" />
        </div>
        <div class="modal-buttons">
          <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
          <button class="btn btn-primary" onclick="createProject()">Create</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-new-key">
      <div class="modal">
        <h3>New API Key</h3>
        <div class="form-group">
          <label>Label</label>
          <input id="new-key-label" type="text" placeholder="e.g. My MTA Server" />
        </div>
        <div class="form-group">
          <label>Link to Project</label>
          <select id="new-key-project"></select>
        </div>
        <div class="modal-buttons">
          <button class="btn btn-secondary" onclick="closeModals()">Cancel</button>
          <button class="btn btn-primary" onclick="createApiKey()">Generate Key</button>
        </div>
      </div>
    </div>

    <!-- ══════════ JAVASCRIPT ══════════ -->
    <script>
      // ─── State ───
      let token = localStorage.getItem('token');
      let currentUser = null;
      let projects = [];
      let currentProject = null;
      let mapObjects = [];
      let leafletMap = null;
      let objectLayers = {};  // id -> leaflet layer
      let citiesLayer = null;

      // Draw state
      let drawPoints = [];
      let drawMarkers = [];
      let drawPreview = null;
      const dotIcon = L.icon({ iconUrl: 'dot.png', iconSize: [10, 10] });

      // ─── API helper ───
      async function api(method, path, body) {
        const opts = {
          method,
          headers: { 'Content-Type': 'application/json' },
        };
        if (token) opts.headers['Authorization'] = 'Bearer ' + token;
        if (body) opts.body = JSON.stringify(body);
        const res = await fetch(path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
      }

      // ─── Screen switching ───
      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
      }

      // ─── Auth ───
      let authMode = 'login';

      function showAuthTab(mode) {
        authMode = mode;
        document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.auth-tabs button').forEach(b => {
          if (b.textContent.toLowerCase() === mode) b.classList.add('active');
        });
        document.getElementById('auth-submit').textContent = mode === 'login' ? 'Login' : 'Register';
        document.getElementById('auth-error').style.display = 'none';
      }

      document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('auth-email').value;
        const password = document.getElementById('auth-pass').value;
        const errEl = document.getElementById('auth-error');
        errEl.style.display = 'none';

        try {
          const data = await api('POST', `/api/auth/${authMode}`, { email, password });
          token = data.token;
          currentUser = data.user;
          localStorage.setItem('token', token);
          goToDashboard();
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
        }
      });

      function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        showScreen('auth-screen');
      }

      // ─── Dashboard ───
      async function goToDashboard() {
        // Destroy map if exists
        if (leafletMap) {
          leafletMap.remove();
          leafletMap = null;
        }
        currentProject = null;

        try {
          if (!currentUser) {
            const data = await api('GET', '/api/auth/me');
            currentUser = data.user;
          }
          document.getElementById('user-email').textContent = currentUser.email;
          showScreen('dashboard-screen');
          await loadProjects();
          await loadApiKeys();
        } catch {
          logout();
        }
      }

      async function loadProjects() {
        const data = await api('GET', '/api/projects');
        projects = data.projects;
        const el = document.getElementById('project-list');
        if (projects.length === 0) {
          el.innerHTML = '<div class="empty-state">No projects yet. Create one to start mapping!</div>';
          return;
        }
        el.innerHTML = projects.map(p => `
          <div class="card" onclick="openProject(${p.id})">
            <div class="card-info">
              <h4>${esc(p.name)}</h4>
              <span>Updated ${new Date(p.updated_at).toLocaleDateString()}</span>
            </div>
            <div class="card-actions">
              <button onclick="event.stopPropagation();deleteProject(${p.id});" class="del">Delete</button>
            </div>
          </div>
        `).join('');
      }

      async function loadApiKeys() {
        const data = await api('GET', '/api/keys');
        const el = document.getElementById('key-list');
        if (data.apiKeys.length === 0) {
          el.innerHTML = '<div class="empty-state">No API keys. Generate one to connect your MTA server.</div>';
          return;
        }
        el.innerHTML = data.apiKeys.map(k => `
          <div class="card" style="cursor:default;">
            <div class="card-info" style="flex:1;">
              <h4>${esc(k.label || 'Unnamed Key')}</h4>
              <span class="key-value">${esc(k.key)}</span>
              <br><span>Project: ${esc(k.project_name || 'None')} | Last used: ${k.last_used_at ? new Date(k.last_used_at).toLocaleDateString() : 'Never'}</span>
            </div>
            <div class="card-actions">
              <button onclick="deleteApiKey(${k.id})" class="del">Revoke</button>
            </div>
          </div>
        `).join('');
      }

      // ─── Modals ───
      function openModal(type) {
        closeModals();
        if (type === 'new-key') {
          // Populate project dropdown
          const sel = document.getElementById('new-key-project');
          sel.innerHTML = '<option value="">No project</option>' +
            projects.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
        }
        document.getElementById('modal-' + type).classList.add('active');
      }
      function closeModals() {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
      }

      async function createProject() {
        const name = document.getElementById('new-project-name').value.trim();
        if (!name) return;
        await api('POST', '/api/projects', { name });
        document.getElementById('new-project-name').value = '';
        closeModals();
        await loadProjects();
      }

      async function deleteProject(id) {
        if (!confirm('Delete this project and all its map data?')) return;
        await api('DELETE', `/api/projects/${id}`);
        await loadProjects();
      }

      async function createApiKey() {
        const label = document.getElementById('new-key-label').value.trim();
        const projectId = document.getElementById('new-key-project').value;
        const data = await api('POST', '/api/keys', {
          label,
          project_id: projectId ? parseInt(projectId) : undefined,
        });
        document.getElementById('new-key-label').value = '';
        closeModals();
        // Show the new key
        const display = document.getElementById('new-key-display');
        document.getElementById('new-key-value').textContent = data.apiKey.key;
        display.style.display = 'block';
        await loadApiKeys();
      }

      async function deleteApiKey(id) {
        if (!confirm('Revoke this API key? MTA servers using it will stop working.')) return;
        await api('DELETE', `/api/keys/${id}`);
        document.getElementById('new-key-display').style.display = 'none';
        await loadApiKeys();
      }

      // ─── Map Editor ───
      async function openProject(id) {
        try {
          const data = await api('GET', `/api/projects/${id}`);
          currentProject = data.project;
          mapObjects = data.objects;
          showScreen('editor-screen');
          document.getElementById('editor-project-name').textContent = currentProject.name;
          initMap();
          renderObjects();
        } catch (err) {
          alert('Failed to load project: ' + err.message);
        }
      }

      function initMap() {
        if (leafletMap) leafletMap.remove();

        leafletMap = L.map('map').setView([0, 0], 1);

        const cartoon = L.tileLayer('cartoonmaptiles/{z}_{x}_{y}.png', { noWrap: true, maxZoom: 5 });
        const aerial = L.tileLayer('mapfilesnew/{z}_{x}_{y}.png', {
          attribution: '<a href="https://github.com/Patrick2562/mtasa-map-images" target="_blank">Map Images by Patrick</a>',
          noWrap: true, maxZoom: 5,
        });
        aerial.addTo(leafletMap);

        citiesLayer = L.layerGroup().addTo(leafletMap);

        L.control.layers({ Drawing: cartoon, Aerial: aerial }, { 'Map Objects': citiesLayer }).addTo(leafletMap);

        // Click handler for drawing
        leafletMap.on('click', (ev) => {
          const type = document.getElementById('draw-type').value;
          if (type === 'marker' && drawPoints.length >= 1) return; // markers = 1 point only
          const latlng = leafletMap.mouseEventToLatLng(ev.originalEvent);
          drawPoints.push([latlng.lat, latlng.lng]);
          const m = L.marker([latlng.lat, latlng.lng], { icon: dotIcon }).addTo(leafletMap);
          drawMarkers.push(m);
          updateDrawPreview();
        });
      }

      function renderObjects() {
        // Clear layers
        if (citiesLayer) citiesLayer.clearLayers();
        objectLayers = {};

        mapObjects.forEach(obj => {
          let layer;
          if (obj.type === 'polygon') {
            layer = L.polygon(obj.positions, {
              color: obj.color, fillColor: obj.color, fillOpacity: 0.1,
            });
          } else if (obj.type === 'polyline') {
            layer = L.polyline(obj.positions, { color: obj.color, weight: 3 });
          } else if (obj.type === 'marker') {
            layer = L.marker(obj.positions[0]);
          }
          if (layer) {
            layer.bindPopup(esc(obj.name || 'Unnamed'));
            citiesLayer.addLayer(layer);
            objectLayers[obj.id] = layer;
          }
        });

        // Sidebar
        const listEl = document.getElementById('obj-list');
        document.getElementById('obj-count').textContent = mapObjects.length;

        if (mapObjects.length === 0) {
          listEl.innerHTML = '<div class="empty-state">No objects. Use the draw tool to add some!</div>';
          return;
        }

        listEl.innerHTML = mapObjects.map(obj => `
          <div class="obj-item" onclick="focusObject(${obj.id})">
            <span class="obj-color" style="background:${esc(obj.color)};"></span>
            <span class="obj-name">${esc(obj.name || 'Unnamed')}</span>
            <span class="obj-type">${esc(obj.type)}</span>
            <button onclick="event.stopPropagation();deleteObject(${obj.id});">&times;</button>
          </div>
        `).join('');
      }

      function focusObject(id) {
        const layer = objectLayers[id];
        if (!layer) return;
        if (layer.getBounds) {
          leafletMap.fitBounds(layer.getBounds(), { padding: [40, 40] });
        } else if (layer.getLatLng) {
          leafletMap.setView(layer.getLatLng(), 4);
        }
        layer.openPopup();
      }

      async function deleteObject(id) {
        if (!confirm('Delete this map object?')) return;
        try {
          await api('DELETE', `/api/projects/${currentProject.id}/objects/${id}`);
          mapObjects = mapObjects.filter(o => o.id !== id);
          renderObjects();
          setSaveStatus('Object deleted');
        } catch (err) {
          alert(err.message);
        }
      }

      // ─── Drawing ───
      function updateDrawPreview() {
        document.getElementById('draw-point-count').textContent = drawPoints.length;
        if (drawPreview) { leafletMap.removeLayer(drawPreview); drawPreview = null; }

        const type = document.getElementById('draw-type').value;
        const color = document.getElementById('draw-color').value;

        if (type === 'polygon' && drawPoints.length >= 2) {
          drawPreview = L.polygon(drawPoints, {
            color, fillColor: color, fillOpacity: 0.15, dashArray: '6,6', weight: 2,
          }).addTo(leafletMap);
        } else if (type === 'polyline' && drawPoints.length >= 2) {
          drawPreview = L.polyline(drawPoints, {
            color, dashArray: '6,6', weight: 2,
          }).addTo(leafletMap);
        }
      }

      document.getElementById('draw-color').addEventListener('input', updateDrawPreview);
      document.getElementById('draw-type').addEventListener('change', () => {
        drawClear();
      });

      function drawUndo() {
        if (drawPoints.length === 0) return;
        drawPoints.pop();
        const m = drawMarkers.pop();
        if (m) leafletMap.removeLayer(m);
        updateDrawPreview();
      }

      function drawClear() {
        drawPoints = [];
        drawMarkers.forEach(m => leafletMap.removeLayer(m));
        drawMarkers = [];
        if (drawPreview) { leafletMap.removeLayer(drawPreview); drawPreview = null; }
        document.getElementById('draw-point-count').textContent = '0';
      }

      async function drawSave() {
        const type = document.getElementById('draw-type').value;
        const name = document.getElementById('draw-name').value.trim() || 'Unnamed';
        const color = document.getElementById('draw-color').value;

        if (type === 'marker' && drawPoints.length < 1) return alert('Place a point on the map first.');
        if (type !== 'marker' && drawPoints.length < 2) return alert('Place at least 2 points.');
        if (type === 'polygon' && drawPoints.length < 3) return alert('Polygons need at least 3 points.');

        setSaveStatus('Saving...');
        try {
          const data = await api('POST', `/api/projects/${currentProject.id}/objects`, {
            type, name, color, positions: drawPoints,
          });
          mapObjects.push(data.object);
          renderObjects();
          drawClear();
          document.getElementById('draw-name').value = '';
          setSaveStatus('Saved!');
        } catch (err) {
          setSaveStatus('Save failed');
          alert(err.message);
        }
      }

      function setSaveStatus(msg) {
        const el = document.getElementById('save-status');
        el.textContent = msg;
        setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 3000);
      }

      // ─── Utils ───
      function esc(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // ─── Init ───
      if (token) {
        goToDashboard();
      }
    </script>
  </body>
</html>
